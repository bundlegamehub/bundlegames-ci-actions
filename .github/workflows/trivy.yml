name: trivy

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-24.04
    steps:
      # Self-reference path-based so we always test the in-PR version of the
      # composite, never a previously-tagged SHA.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./actions/trivy-scan
        with:
          checkout: "false"
