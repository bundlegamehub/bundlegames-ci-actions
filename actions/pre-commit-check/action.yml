name: pre-commit-check
description: >-
  Run pre-commit hooks (actionlint, shellcheck, gitleaks, check-yaml, typos)
  on changed files or the entire repo. Used by every repo's PR workflow so
  lint is consistent across the org. Skips cleanly when the consumer repo
  doesn't have a .pre-commit-config.yaml — use
  bundlegames-devx/scripts/install-shared-config.sh to install the baseline.
author: BundleGames

inputs:
  all-files:
    description: If true, runs on all files (slower). Otherwise only changed files on the PR.
    required: false
    default: "false"
  checkout:
    description: >-
      If true, run actions/checkout. Set to false when the calling job has
      already checked out (typical for path-based self-references like
      `uses: ./actions/pre-commit-check` — a second checkout in that flow
      causes GitHub's runner to layer two `Authorization` headers and the
      git fetch fails with HTTP 400 "Duplicate header: Authorization").
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Checkout
      if: inputs.checkout == 'true'
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0

    - name: Check for pre-commit config
      id: check
      shell: bash
      run: |
        set -euo pipefail
        if [[ -f .pre-commit-config.yaml ]]; then
          echo "present=true" >> "$GITHUB_OUTPUT"
        else
          echo "::warning title=pre-commit skipped::No .pre-commit-config.yaml at repo root. Run bundlegames-devx/scripts/install-shared-config.sh to install the shared baseline, then commit it."
          echo "present=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Python
      if: steps.check.outputs.present == 'true'
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
      with:
        python-version: "3.12"

    - name: Resolve pre-commit ref range
      # Avoid nested ${{ }} — GitHub won't interpolate the inner expression,
      # so we compute the pre-commit args in a shell step and hand them to
      # the action via env.
      if: steps.check.outputs.present == 'true'
      id: args
      shell: bash
      env:
        ALL_FILES: ${{ inputs.all-files }}
        BASE_REF: ${{ github.base_ref }}
      run: |
        set -euo pipefail
        if [[ "${ALL_FILES}" == "true" || -z "${BASE_REF}" ]]; then
          echo "extra=--all-files" >> "$GITHUB_OUTPUT"
        else
          echo "extra=--from-ref origin/${BASE_REF} --to-ref HEAD" >> "$GITHUB_OUTPUT"
        fi

    - name: Run pre-commit
      if: steps.check.outputs.present == 'true'
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
      with:
        extra_args: ${{ steps.args.outputs.extra }}
