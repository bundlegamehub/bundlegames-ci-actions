name: mvnw-verify
description: >-
  Checkout, set up Temurin JDK, restore Maven cache, run ./mvnw. Supports
  private GitHub Packages auth. Defaults to Java 25 + Maven 3.9 matching the
  BundleGames toolchain matrix.
author: BundleGames

inputs:
  java-version:
    description: Temurin major version.
    required: false
    default: "25"
  test-group:
    description: |
      Which tests to run. Options:
        unit        — unit tests only (`-DexcludedGroups=integration`)
        integration — full `mvnw verify` (unit + Testcontainers IT + detekt)
        detekt      — `./mvnw -B -DskipTests detekt:check`
        none        — skip all tests (compile + detekt)
    required: false
    default: "unit"
  working-directory:
    description: Directory containing `pom.xml`.
    required: false
    default: "."
  maven-args:
    description: Extra flags to append to the mvnw command.
    required: false
    default: ""
  github-packages-username:
    description: GitHub Packages username — pass via `secrets.BUNDLEGAMES_PACKAGES_USERNAME`. Required when consuming bundlegames-spring-packages from GitHub Packages.
    required: false
    default: ""
  github-packages-token:
    description: GitHub Packages token — pass via `secrets.BUNDLEGAMES_PACKAGES_TOKEN`.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Export GitHub Packages credentials to environment
      # Write the creds to $GITHUB_ENV so every subsequent step (setup-java's
      # settings.xml rendering + mvnw) sees them. Mask the token so it's
      # scrubbed from logs. Composite-level step env: blocks don't reliably
      # propagate into setup-java's settings.xml rendering; job-level env or
      # $GITHUB_ENV does.
      if: inputs.github-packages-username != '' || inputs.github-packages-token != ''
      shell: bash
      env:
        GHP_USERNAME: ${{ inputs.github-packages-username }}
        GHP_TOKEN: ${{ inputs.github-packages-token }}
      run: |
        set -euo pipefail
        if [[ -z "${GHP_USERNAME}" ]]; then
          echo "github-packages-username passed but empty" >&2
          exit 1
        fi
        if [[ -z "${GHP_TOKEN}" ]]; then
          echo "github-packages-token passed but empty" >&2
          exit 1
        fi
        echo "::add-mask::${GHP_TOKEN}"
        {
          echo "BUNDLEGAMES_PACKAGES_USERNAME=${GHP_USERNAME}"
          echo "BUNDLEGAMES_PACKAGES_TOKEN=${GHP_TOKEN}"
        } >> "$GITHUB_ENV"

    - name: Set up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
        cache: maven
        server-id: github
        server-username: BUNDLEGAMES_PACKAGES_USERNAME
        server-password: BUNDLEGAMES_PACKAGES_TOKEN

    - name: Run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TEST_GROUP: ${{ inputs.test-group }}
        MAVEN_ARGS: ${{ inputs.maven-args }}
      run: |
        set -euo pipefail
        case "${TEST_GROUP}" in
          unit)
            ./mvnw -B -DexcludedGroups=integration test ${MAVEN_ARGS}
            ;;
          integration)
            ./mvnw -B verify ${MAVEN_ARGS}
            ;;
          detekt)
            ./mvnw -B -DskipTests detekt:check ${MAVEN_ARGS}
            ;;
          none)
            ./mvnw -B -DskipTests verify ${MAVEN_ARGS}
            ;;
          *)
            echo "Unknown test-group: ${TEST_GROUP}" >&2
            exit 1
            ;;
        esac
